# GMP App Mobilidad - Production Docker Compose
# Usage: docker compose up -d (prod) | docker compose --profile dev up -d (dev)
# Note: DB2 cannot be containerized. Configure external DB2 via .env

services:
  # ─── Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gmp-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3334}:${PORT:-3334}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3334}
      - ODBC_DSN=${ODBC_DSN:-GMP}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-3334}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gmp-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # ─── Redis Cache (L2) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gmp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - gmp-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ─── Redis Commander (Dev only) ────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gmp-redis-commander
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redispassword}
    depends_on:
      - redis
    profiles:
      - dev
    networks:
      - gmp-network

volumes:
  redis-data:
    driver: local

networks:
  gmp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
