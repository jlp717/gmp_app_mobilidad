# Unified CI/CD Pipeline - GMP App Movilidad
# Single pipeline replacing ci.yml, ci-cd.yml, test.yml, kpi-ci.yml
# Phases: lint → test → security → build → release

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, test, pre]
  pull_request:
    branches: [main, develop, test, pre]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

# Cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # PHASE 1: LINT & STATIC ANALYSIS
  # ==========================================================================
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Flutter dependencies
        run: flutter pub get

      - name: Backend dependencies
        run: cd backend && npm ci

      - name: Flutter format check
        run: dart format --set-exit-if-changed lib test
        continue-on-error: true

      - name: Flutter analyze (errors fail, warnings pass)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: false

      - name: Backend lint
        run: cd backend && npm run lint --if-present
        continue-on-error: true

      - name: TypeScript compile check
        run: cd backend && npx tsc --noEmit
        continue-on-error: true

  # ==========================================================================
  # PHASE 2: TESTS
  # ==========================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Flutter dependencies
        run: flutter pub get

      - name: Backend dependencies
        run: cd backend && npm ci

      - name: Backend tests
        run: cd backend && npx jest --passWithNoTests --coverage --silent
        continue-on-error: true

      - name: Flutter tests
        run: flutter test --no-pub --coverage
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info,backend/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # PHASE 3: SECURITY SCAN
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Backend dependencies
        run: cd backend && npm ci

      - name: npm audit
        run: cd backend && npm audit --audit-level=high || true

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for default secrets
          if grep -r "default-secret\|dev-access-secret\|dev-refresh-secret" backend/src --include="*.js" --include="*.ts" 2>/dev/null; then
            echo "❌ Found hardcoded default secrets!"
            FOUND=1
          fi
          # Check for .env files in repo
          if git ls-files | grep -E "\.env$|\.env\.(local|production|staging)$" 2>/dev/null; then
            echo "❌ Found .env files committed!"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "Security scan failed - remove hardcoded secrets before deploying"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Generate SBOM
        run: |
          cd backend && npm ls --json > ../sbom-backend.json
          flutter pub deps --json > sbom-flutter.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-flutter.json
          retention-days: 90

  # ==========================================================================
  # PHASE 4: BUILD ANDROID
  # ==========================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build APK debug
        if: github.ref == 'refs/heads/test'
        run: flutter build apk --debug

      - name: Build APK & AAB release
        if: github.ref == 'refs/heads/main'
        run: |
          flutter build apk --release --split-per-abi
          flutter build appbundle --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-builds-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: APK size report
        run: |
          echo "## APK Sizes" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null | awk '{print "- " $9 ": " $5}' >> $GITHUB_STEP_SUMMARY || true

  # ==========================================================================
  # PHASE 5: BUILD iOS (main branch only)
  # ==========================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: build/ios/iphoneos/*.app
          retention-days: 30

  # ==========================================================================
  # PHASE 6: SEMANTIC VERSIONING (main only)
  # ==========================================================================
  version:
    name: Semantic Version
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: version
        run: |
          CURRENT=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Create git tag
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true

      - name: Create release notes
        run: |
          echo "## Release ${{ steps.version.outputs.current }}" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Changes" >> release-notes.md
          git log --oneline -20 >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.current }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/test' }}
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
