<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Load Planner 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #12161e;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      display: block; width: 100%; height: 100%;
      touch-action: none;
    }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      background: #12161e;
      color: #6B7280; font-size: 13px; font-weight: 500;
      letter-spacing: 0.03em; z-index: 100;
    }
    #loading::before {
      content: ''; width: 28px; height: 28px;
      border: 2px solid rgba(76, 200, 232, 0.15);
      border-top-color: rgba(76, 200, 232, 0.8);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Inicializando escena 3D…</div>
  <script>
    window._sceneInitDone = false;
    window._sceneError = null;
    window.addEventListener('error', function(e) {
      var d = (e.filename ? e.filename + ':' + e.lineno + ' ' : '') + e.message;
      console.error('Scene error:', d);
      window._sceneError = d;
      var el = document.getElementById('loading');
      if (el) el.textContent = 'Error: ' + d;
      if (!window._sceneInitDone && window.FlutterBridge) {
        window._sceneInitDone = true;
        window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
      }
    });
    setTimeout(function() {
      if (!window._sceneInitDone) {
        console.warn('Scene init timeout (12s)');
        if (window.FlutterBridge) {
          window._sceneInitDone = true;
          window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
        }
        var el = document.getElementById('loading');
        if (el) el.textContent = 'Error: ' + (window._sceneError || 'Timeout');
      }
    }, 12000);
  </script>
  <script src="lib/three.global.js"></script>
  <script src="lib/OrbitControls.global.js"></script>
  <script src="load_planner_3d.global.js"></script>
</body>
</html>
