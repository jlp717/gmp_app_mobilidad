<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Load Planner 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F172A;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* CSS2D labels */
    .box-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: #FFFFFF;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }

    .box-label.hidden {
      display: none;
    }

    /* Dimension labels */
    .dim-label {
      font-family: 'Segoe UI Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 500;
      color: rgba(0, 212, 255, 0.6);
      pointer-events: none;
      white-space: nowrap;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      color: #6B7280;
      font-family: system-ui;
      font-size: 14px;
      z-index: 100;
    }

    #loading.hidden {
      display: none;
    }
  </style>

  <!-- Global scripts — NO ES modules, maximum WebView compatibility -->
</head>

<body>
  <div id="loading">Inicializando escena 3D...</div>
  <script>
    // Safety net: capture any script error and report to Flutter
    window._sceneInitDone = false;
    window._sceneError = null;

    window.addEventListener('error', function (e) {
      var detail = (e.filename ? e.filename + ':' + e.lineno + ' ' : '') + e.message;
      console.error('Scene error:', detail);
      window._sceneError = detail;
      var el = document.getElementById('loading');
      if (el) el.textContent = 'Error: ' + detail;
      if (!window._sceneInitDone && window.FlutterBridge) {
        window._sceneInitDone = true;
        window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
      }
    });

    setTimeout(function () {
      if (!window._sceneInitDone) {
        console.warn('Scene init timeout (15s)');
        var msg = window._sceneError || 'Timeout inicializando Three.js';
        if (window.FlutterBridge) {
          window._sceneInitDone = true;
          window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
        }
        var el = document.getElementById('loading');
        if (el) el.textContent = 'Error: ' + msg;
      }
    }, 15000);
  </script>

  <!-- Load order: Three.js core → addons → main app (all regular scripts, NO modules) -->
  <script src="lib/three.global.js"></script>
  <script src="lib/OrbitControls.global.js"></script>
  <script src="lib/CSS2DRenderer.global.js"></script>
  <script src="load_planner_3d.global.js"></script>
</body>

</html>
