<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Load Planner 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F172A;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* CSS2D labels */
    .box-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: #FFFFFF;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }

    .box-label.hidden {
      display: none;
    }

    /* Dimension labels */
    .dim-label {
      font-family: 'Segoe UI Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 500;
      color: rgba(0, 212, 255, 0.6);
      pointer-events: none;
      white-space: nowrap;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      color: #6B7280;
      font-family: system-ui;
      font-size: 14px;
      z-index: 100;
    }

    #loading.hidden {
      display: none;
    }
  </style>

  <!-- No import map: all imports use relative paths for maximum WebView compatibility -->
</head>

<body>
  <div id="loading">Inicializando escena 3D...</div>
  <script>
    // Safety net: if Three.js module fails to load, notify Flutter after timeout
    window._sceneInitDone = false;
    window._sceneError = null;

    window.addEventListener('error', function (e) {
      console.error('Scene load error:', e.message, e.filename, e.lineno);
      window._sceneError = e.message;
      if (!window._sceneInitDone && window.FlutterBridge) {
        window._sceneInitDone = true;
        window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
        document.getElementById('loading').textContent = 'Error JS: ' + e.message;
      }
    });

    // Catch module import failures (unresolved bare specifiers, etc.)
    window.addEventListener('unhandledrejection', function (e) {
      console.error('Module load rejection:', e.reason);
      window._sceneError = String(e.reason);
      if (!window._sceneInitDone && window.FlutterBridge) {
        window._sceneInitDone = true;
        window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
        document.getElementById('loading').textContent = 'Error modulo: ' + e.reason;
      }
    });

    setTimeout(function () {
      if (!window._sceneInitDone) {
        console.warn('Scene init timeout (15s)');
        var msg = window._sceneError || 'Timeout inicializando Three.js';
        if (window.FlutterBridge) {
          window._sceneInitDone = true;
          window.FlutterBridge.postMessage(JSON.stringify({ type: 'sceneReady' }));
        }
        document.getElementById('loading').textContent = 'Error: ' + msg;
      }
    }, 15000);
  </script>
  <script type="module" src="load_planner_3d.js"></script>
</body>

</html>
